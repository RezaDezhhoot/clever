version: '3.8'

services:
  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    container_name: cleverquest_backend_local
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      - db
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    restart: unless-stopped
    volumes:
      - ./services/backend:/app
      - ./services/storage/data:/app/storage
      - /app/node_modules
    command: sh -c "npm install && npm run db:migrate && npm run db:seed && npm run dev"
    networks:
      - clever

  admin:
    build:
      context: ./services/admin
      dockerfile: Dockerfile
    container_name: cleverquest_admin_local
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - backend
    ports:
      - "${ADMIN_PORT:-5173}:5173"
    restart: unless-stopped
    volumes:
      - ./services/admin:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    networks:
      - clever

  db:
    image: postgres:16
    container_name: cleverquest_db_local
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./services/db/data:/var/lib/postgresql/data
    networks:
      - clever

networks:
  clever:
    driver: bridge
