version: '3.8'

services:
  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    container_name: cleverquest_backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      - db
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./services/storage/data:/app/storage
    command: sh -c "npm run db:migrate && npm run db:seed && npm run start"
    networks:
      - clever

  admin:
    build:
      context: ./services/admin
      dockerfile: Dockerfile
    container_name: cleverquest_admin
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - backend
    ports:
      - "${ADMIN_PORT:-5173}:4173"
    restart: unless-stopped
    command: sh -c "npm run build && npm run preview -- --host 0.0.0.0 --port 4173"
    networks:
      - clever

  db:
    image: postgres:16
    container_name: cleverquest_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./services/db/data:/var/lib/postgresql/data
    networks:
      - clever

  pgadmin:
    image: dpage/pgadmin4
    container_name: cleverquest_pgadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    networks:
      - clever

networks:
  clever:
    driver: bridge
